version: 2

project_name: feishu-docs-cli

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: feishu-docs-cli
    ldflags:
      - -s -w
      - -X github.com/KQAR/feishu-docs-cli/internal/version.Version={{.Version}}
      - -X github.com/KQAR/feishu-docs-cli/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/KQAR/feishu-docs-cli/internal/version.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: KQAR
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/KQAR/feishu-docs-cli
    description: 飞书文档与知识库 CLI 管理工具
    license: MIT
    install: |
      bin.install "feishu-docs-cli"
    test: |
      system "#{bin}/feishu-docs-cli", "version"
